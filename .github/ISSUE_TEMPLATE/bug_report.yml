name: Bug report
description: Report something that is broken or not working as expected
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please search [existing issues](https://github.com/tong-io/tongflow/issues) first.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, short description of the problem.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do before the issue appeared?
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, browser, TongFlow version, Node version if relevant.
      placeholder: |
        - OS: macOS 14
        - Browser: Chrome 120
        - TongFlow: v0.1.0 (commit ...)
        - Node: 20.x

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Optional. Redact API keys and personal data.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
