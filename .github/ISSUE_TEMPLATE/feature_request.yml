name: Feature request
description: Suggest an idea or improvement for TongFlow
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please check [discussions](https://github.com/tong-io/tongflow/discussions) and [existing issues](https://github.com/tong-io/tongflow/issues) first.

  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: What problem does this solve, or who benefits?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Optional mockups or references.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Optional.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched existing issues for duplicates
          required: true
